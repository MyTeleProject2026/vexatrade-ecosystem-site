<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Cyan Gradient for VexaTrade Brand -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    
    <!-- Dark Background Gradient -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1c" />
      <stop offset="100%" stop-color="#0f1422" />
    </linearGradient>
    
    <!-- Gold Gradient for Trust Fund Icon -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="100%" stop-color="#ffb347" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Shadow Effect -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d4ff" flood-opacity="0.25" />
    </filter>
    
    <!-- Text Shadow -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="800" height="400" fill="url(#darkBg)" rx="16" />
  
  <!-- Outer Glowing Border -->
  <rect x="6" y="6" width="788" height="388" rx="12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" />
  
  <!-- Decorative Background Circles -->
  <circle cx="700" cy="50" r="180" fill="#00d4ff" opacity="0.03" />
  <circle cx="80" cy="380" r="120" fill="#38bdf8" opacity="0.03" />

  <!-- Top Accent Bar -->
  <rect x="20" y="20" width="760" height="3" fill="url(#cyanGrad)" filter="url(#glow)" opacity="0.8" />

  <!-- "POST" Badge Top Left -->
  <rect x="30" y="35" width="60" height="22" rx="11" fill="none" stroke="#38bdf8" stroke-width="1" />
  <text x="60" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5">POST</text>

  <!-- Category Badge -->
  <rect x="100" y="35" width="90" height="22" rx="11" fill="#00d4ff" opacity="0.15" />
  <text x="145" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#b0bedb" text-anchor="middle" letter-spacing="1">TRUST FUNDS</text>

  <!-- === LEFT SIDE: Trust Fund Icon (Shield + Coins) === -->
  <g transform="translate(120, 200)">
    <!-- Outer Shield -->
    <path d="M0,-70 L45,-35 L45,25 L0,65 L-45,25 L-45,-35 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.9" filter="url(#shadow)" />
    
    <!-- Inner Shield -->
    <path d="M0,-55 L35,-27 L35,20 L0,50 L-35,20 L-35,-27 Z" 
          fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.4" />
    
    <!-- Coin Stack (Left) -->
    <ellipse cx="-20" cy="10" rx="18" ry="8" fill="#ffd700" opacity="0.9" />
    <ellipse cx="-20" cy="5" rx="18" ry="8" fill="#ffb347" opacity="0.9" />
    <ellipse cx="-20" cy="0" rx="18" ry="8" fill="#ffd700" opacity="0.9" />
    
    <!-- Coin Stack (Right) -->
    <ellipse cx="20" cy="10" rx="18" ry="8" fill="#ffd700" opacity="0.9" />
    <ellipse cx="20" cy="5" rx="18" ry="8" fill="#ffb347" opacity="0.9" />
    <ellipse cx="20" cy="0" rx="18" ry="8" fill="#ffd700" opacity="0.9" />
    
    <!-- Center Dollar Symbol -->
    <text x="0" y="12" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="#ffd700" text-anchor="middle" filter="url(#glow)">$</text>
    
    <!-- Small Stars around Shield -->
    <text x="-55" y="-50" font-size="14" fill="#ffd700" opacity="0.6">✦</text>
    <text x="40" y="-55" font-size="10" fill="#ffd700" opacity="0.4">✦</text>
    <text x="-50" y="60" font-size="10" fill="#ffd700" opacity="0.4">✦</text>
    <text x="45" y="65" font-size="14" fill="#ffd700" opacity="0.6">✦</text>
  </g>

  <!-- === RIGHT SIDE: Text Content === -->
  <!-- VexaTrade Label -->
  <text x="210" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#b0bedb" letter-spacing="2">VEXATRADE ECOSYSTEM</text>
  
  <!-- Main Title -->
  <text x="210" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="900" fill="#ffffff" letter-spacing="1" filter="url(#textShadow)">
    Trust Funds
  </text>
  <text x="210" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="url(#cyanGrad)" letter-spacing="0.5" filter="url(#textShadow)">
    Start Earning Daily
  </text>
  
  <!-- Divider -->
  <rect x="210" y="185" width="200" height="2.5" fill="url(#cyanGrad)" filter="url(#glow)" />
  
  <!-- Description -->
  <text x="210" y="215" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="300" fill="#b0bedb">
    Generate passive income automatically
  </text>
  <text x="210" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="300" fill="#b0bedb">
    with blockchain-powered Trust Funds.
  </text>
  
  <!-- Features List -->
  <g transform="translate(210, 265)">
    <circle cx="0" cy="0" r="4" fill="#00d4ff" filter="url(#glow)" />
    <text x="14" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#b0bedb">Daily Payouts</text>
    
    <circle cx="130" cy="0" r="4" fill="#00d4ff" filter="url(#glow)" />
    <text x="144" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#b0bedb">Up to 12% ROI</text>
    
    <circle cx="260" cy="0" r="4" fill="#00d4ff" filter="url(#glow)" />
    <text x="274" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#b0bedb">100% Secure</text>
  </g>
  
  <!-- Read More Button -->
  <rect x="210" y="310" width="160" height="38" rx="19" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#shadow)" />
  <text x="290" y="335" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5">READ MORE →</text>

  <!-- Bottom Accent Bar -->
  <rect x="20" y="378" width="760" height="3" fill="url(#cyanGrad)" filter="url(#glow)" opacity="0.3" />
</svg>